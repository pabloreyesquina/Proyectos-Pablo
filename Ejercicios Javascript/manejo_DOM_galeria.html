<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor-foto {
            display: inline-block;
            margin: 10px;
            border: 1px solid #ccc;
            padding: 5px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);

        }
        .contenedor-foto:hover{
            transform: scale(1.02);

        }

        img {
            display: block;
            margin-bottom: 5px;
        }

        .btn-eliminar {
            background-color: red;
            color: white;
            width: 100%;
            border-radius: 8px;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            transition: 0.3s;

        }

        .btn-eliminar:hover {
            background-color: #b30000;
            transform: scale(1.02);
        }
        
        .btn-borrar-todo {
            background-color: red;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            


        }
    </style>


</head>

<body>
    
    <h2>Mi Galería Dinámica</h2>
    <button onclick="borrarTodo()" class="btn-borrar-todo">Borrar toda la Galería</button>
    <div id="galeria">

    </div>

    <input type="url" id="url-imagen" placeholder="URL de la imagen">
    <input type="text" id="titulo-imagen" placeholder="Titulo de la imagen">
    <button onclick="agregarImagen()">Agregar Imagen</button>
    

    <script>
        function agregarImagen() {
            const url = document.getElementById("url-imagen").value;
            const galeria = document.getElementById("galeria");
            const titulo = document.getElementById("titulo-imagen").value;
            const fecha = new Date().toLocaleDateString();

            const contenedor = document.createElement("div");
            contenedor.className = "contenedor-foto";
            
            const tituloImagen = document.createElement("h3");
            tituloImagen.textContent = titulo;

            const fechaImagen = document.createElement("p");
            fechaImagen.textContent = fecha;

            const nuevaImagen = document.createElement("img");
            nuevaImagen.src = url;
            nuevaImagen.width = 200;
            nuevaImagen.style.borderRadius = "8px"




            const botonEliminar = document.createElement("button");
            botonEliminar.textContent = "Eliminar";
            botonEliminar.className = "btn-eliminar";
            
            botonEliminar.onclick = function () {
                contenedor.remove();
            };

            contenedor.append(tituloImagen, nuevaImagen,fechaImagen, botonEliminar);
            galeria.appendChild(contenedor);

        }

        function borrarTodo() {
            const galeria = document.getElementById("galeria");
            galeria.textContent = "";

        }
    </script>

</body>

</html>
