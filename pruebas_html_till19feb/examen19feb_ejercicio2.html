<!-- Escribe la regla CSS (selector y propiedades) necesaria para que: 
•	Todos los enlaces de una página web aparezcan inicialmente con tipografía Arial, subrayados y sin cursiva y al pasar el cursor del ratón por encima de ellos cambien a tipografía Georgia, cursiva y no subrayados. 
•	Todos los párrafos dentro de un bloque DIV tengan sólo la primera línea en bold (negrita) y el resto en normal.
Probarlo en un prototipo de página html con enlaces <a> dentro de un <footer> al final de la página y que tengan esos estilos, asegurando que se abren dentro de la propia pestaña de navegación, anclándolos para que vayan al inicio de página.
 -->


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo de página</title>
    <link rel="stylesheet" href="examen19feb_ejercicio2.css">
</head>

<body id="inicio">

    <div>
        <p>
            Esta es la primera línea que debe aparecer en negrita.<br>
            Esta es la segunda línea y debe aparecer en formato normal.
        </p>
    </div>

    <footer>
        <a href="#inicio" target="_self">Enlace al inicio 1</a>
        <a href="#inicio" target="_self">Enlace al inicio 2</a>
    </footer>

</body>
</html>
