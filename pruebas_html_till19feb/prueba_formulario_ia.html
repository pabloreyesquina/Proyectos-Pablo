<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>Formulario de Prueba</h1>
    </header>

    <section>
        <p>Por favor, complete el siguiente formulario:</p>
    </section>

    <form action="prueba_formulario.html" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre aquí" ><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="comentarios">Comentarios:</label><br>
        <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad"><br><br>

        <label for="fechaNacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento"><br><br>

        <h2>¿Te gusta programar?</h2>
        <input type="checkbox" id="programar" name="programar" value="si">
        <label for="programar">Si</label><br>
        <input type="checkbox" id="noProgramar" name="noProgramar" value="no">
        <label for="noProgramar">No</label><br><br>

        <h2>¿Qué tipo de programación te gusta más?</h2>
        <input type="radio" id="frontend" name="tipoProgramacion" value="frontend">
        <label for="frontend">Frontend</label><br>
        <input type="radio" id="backend" name="tipoProgramacion" value="backend">
        <label for="backend">Backend</label><br><br>

        <label for="idioma">Idioma favorito:</label>
        <select id="idioma" name="idioma">
            <option value="">-- Seleccione un idioma --</option>
            <option value="es">Español</option>
            <option value="en">Inglés</option>
            <option value="fr">Francés</option>
        </select><br><br>

        <label for="archivo">Archivo:</label>
        <input type="file" id="archivo" name="archivo"><br><br>

        <label for="rango">Rango de valor:</label>
        <input type="range" id="rango" name="rango" min="0" max="100" step="1"><br><br>

        <input type="submit" value="Enviar">
    </form>
</body>

</html>
