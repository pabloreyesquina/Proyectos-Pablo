<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaPro | Gestión de Citas Profesional</title>
    <meta name="description"
        content="Sistema profesional de gestión de citas para servicios únicos. Evita solapamientos y gestiona tu agenda de forma eficiente.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>AgendaPro</h1>
                <span class="badge-prof">Panel Profesional</span>
            </div>
            <div id="current-date-display" style="color: var(--text-muted); font-weight: 500;"></div>
        </header>

        <main class="calendar-section">
            <div class="calendar-header">
                <h2 id="month-year">Mes Año</h2>
                <div class="nav-buttons">
                    <button id="prevMonth" title="Mes Anterior">←</button>
                    <button id="todayBtn">Hoy</button>
                    <button id="nextMonth" title="Mes Siguiente">→</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <div class="weekday">Lun</div>
                <div class="weekday">Mar</div>
                <div class="weekday">Mié</div>
                <div class="weekday">Jue</div>
                <div class="weekday">Vie</div>
                <div class="weekday">Sáb</div>
                <div class="weekday">Dom</div>
                <!-- Los días se inyectarán por JS -->
            </div>
        </main>

        <aside class="form-section">
            <div class="appointment-form">
                <h3>Nueva Cita</h3>
                <form id="booking-form">
                    <div class="form-group">
                        <label for="client-name">Nombre del Paciente/Cliente *</label>
                        <input type="text" id="client-name" required placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="appointment-date">Fecha *</label>
                        <input type="date" id="appointment-date" required>
                    </div>
                    <div class="form-group">
                        <label for="appointment-time">Franja Horaria *</label>
                        <select id="appointment-time" required>
                            <option value="" disabled selected>Selecciona una hora</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="12:00">12:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                            <option value="17:00">17:00</option>
                            <option value="18:00">18:00</option>
                            <option value="19:00">19:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="notes">Observaciones (Opcional)</label>
                        <textarea id="notes" rows="2" placeholder="Notas adicionales..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Registrar Cita</button>
                </form>
            </div>

            <div class="details-section">
                <div class="details-header">
                    <span id="selected-day-label">Día Seleccionado</span>
                    <span id="appointment-count" class="badge-prof">0 Citas</span>
                </div>
                <div class="slots-container" id="slots-container">
                    <!-- Las franjas se inyectarán por JS -->
                </div>
            </div>
        </aside>
    </div>

    <div id="notification" class="notification">
        <span id="notification-message"></span>
    </div>

    <script src="script.js"></script>
</body>

</html>
