<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCal | Professional Appointment Manager</title>
    <meta name="description" content="A professional appointment calendar for single-service management. Book, view, and manage client appointments with ease.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>ProCal</h1>
            <div id="current-date-display" style="color: var(--text-muted); font-weight: 500;"></div>
        </header>

        <main class="calendar-section">
            <div class="calendar-header">
                <h2 id="month-year">Month Year</h2>
                <div class="nav-buttons">
                    <button id="prevMonth">&lt;</button>
                    <button id="todayBtn">Today</button>
                    <button id="nextMonth">&gt;</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
                <!-- Days will be injected by JS -->
            </div>
        </main>

        <aside class="form-section">
            <div class="appointment-form">
                <h3>New Appointment</h3>
                <form id="booking-form">
                    <div class="form-group">
                        <label for="client-name">Client Name *</label>
                        <input type="text" id="client-name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="appointment-date">Date *</label>
                        <input type="date" id="appointment-date" required>
                    </div>
                    <div class="form-group">
                        <label for="appointment-time">Time Slot *</label>
                        <select id="appointment-time" required>
                            <option value="" disabled selected>Select a slot</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="12:00">12:00 PM</option>
                            <option value="13:00">01:00 PM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="15:00">03:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                            <option value="17:00">05:00 PM</option>
                            <option value="18:00">06:00 PM</option>
                            <option value="19:00">07:00 PM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes (Optional)</label>
                        <textarea id="notes" rows="2" placeholder="Any special requests?"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Book Appointment</button>
                </form>
            </div>

            <div class="details-section">
                <div class="details-header">
                    <span id="selected-day-label">Selected Day</span>
                    <span id="appointment-count" style="font-size: 0.8rem; background: var(--primary); color: white; padding: 2px 8px; border-radius: 20px;">0 Citas</span>
                </div>
                <div class="slots-container" id="slots-container">
                    <!-- Slots will be injected by JS -->
                </div>
            </div>
        </aside>
    </div>

    <div id="notification" class="notification">
        <span id="notification-message"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
